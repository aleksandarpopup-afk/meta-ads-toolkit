<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meta Ads Toolkit</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #08080f; color: #fff; -webkit-font-smoothing: antialiased; font-family: 'Syne', sans-serif; }
      input, button, select, textarea { -webkit-tap-highlight-color: transparent; font-family: 'Syne', sans-serif; }
      input[type="number"] { -moz-appearance: textfield; }
      input[type="number"]::-webkit-outer-spin-button,
      input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
      @media (max-width: 520px) {
        .g2 { grid-template-columns: 1fr !important; }
        .g3 { grid-template-columns: 1fr 1fr !important; }
        .g4 { grid-template-columns: 1fr 1fr !important; }
        .mod-grid { grid-template-columns: 1fr !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
